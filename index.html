<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriFit Smart Dashboard Portal</title>
    <style>
        /* 하이엔드 D2C 게이트웨이 무드의 전체 화면 스타일링 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #F3F7F4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 로컬 Streamlit 서버를 임베딩하는 전체화면 프레임 */
        .app-iframe {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 8515 포트 미기동 시 보여줄 세련된 웰컴 안내 레이어 (기본은 감춤 상태) */
        .fallback-container {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
            text-align: center;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }

        .fallback-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
        }

        .fallback-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1F3D2B;
            margin-bottom: 12px;
        }

        .fallback-desc {
            font-size: 0.95rem;
            color: #4B5563;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .btn-retry {
            display: inline-block;
            background: linear-gradient(135deg, #4C7A5E, #1F3D2B);
            color: white;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(76, 122, 94, 0.2);
            transition: all 0.3s ease-in-out;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(76, 122, 94, 0.35);
        }
    </style>
</head>
<body>

    <!-- 8515 포트 Streamlit 대시보드 임베딩 -->
    <iframe id="streamlitFrame" class="app-iframe" src="http://localhost:8515" title="NutriFit Smart Dashboard"></iframe>

    <!-- 연결 실패 시 제공되는 프리미엄 폴백 레이어 -->
    <div id="fallbackLayer" class="fallback-container">
        <div class="fallback-card">
            <div class="fallback-title">🥗 NutriFit 포털 대기 중</div>
            <div class="fallback-desc">
                현재 <strong>NutriFit Smart Dashboard(8515 포트)</strong> 서버가 로컬에서 기동 대기 중이거나 연결을 설정하는 중입니다.<br>
                터미널 환경에서 서버가 활성화되었는지 확인해 주세요.
            </div>
            <a href="javascript:location.reload();" class="btn-retry">🔄 연결 다시 시도하기</a>
        </div>
    </div>

    <script>
        // 프레임 연결 타임아웃 감지용 헬퍼 스크립트
        const iframe = document.getElementById('streamlitFrame');
        const fallback = document.getElementById('fallbackLayer');

        // 3.5초 이내에 스트림릿 앱이 로드되지 않거나 에러 발생 시 안내 레이어 노출
        const timeout = setTimeout(() => {
            try {
                // cross-origin 검사 시도
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                if (!doc) {
                    fallback.style.display = 'flex';
                }
            } catch (e) {
                // 정상적으로 로딩되면 CORS 에러로 catch로 가거나 성공함
                console.log("포털 게이트웨이 로드 완료");
            }
        }, 3500);

        iframe.onload = function() {
            clearTimeout(timeout);
        };
    </script>
</body>
</html>
